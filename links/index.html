<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Encrypted quick links for Xu Yu-Chia." />
  <title>Private Links | Xu Yu-Chia</title>
  <link rel="shortcut icon" href="../assets/img/logo.ico" type="image/x-icon" />
  <link rel="stylesheet" href="../assets/css/site.css" />
  <script src="../assets/js/home.js?v=20260712d" defer></script>
</head>
<body class="private">
  <header class="site-header">
    <nav class="nav" aria-label="主要導覽">
      <a class="brand" href="../index.html">
        <img class="brand-mark" src="../assets/img/logo.ico" alt="" />
        <span>Xu Yu-Chia</span>
      </a>
      <button class="menu-button home-menu-button" type="button" aria-expanded="false" aria-controls="site-navigation">
        <span>Menu</span>
        <span class="menu-icon home-menu-icon" aria-hidden="true"></span>
      </button>
      <div class="nav-panel home-nav-panel" id="site-navigation">
        <a href="../index.html">Home</a>
        <a href="../projects/index.html">Projects</a>
        <a href="../sports/index.html">Sports</a>
        <a href="https://xu-yu-chia.github.io/blog/">Blog</a>
        <a href="../contact/index.html">Contact</a>
      </div>
    </nav>
  </header>

  <main class="page private-shell">
    <section>
      <p class="kicker">05 / Private</p>
      <h1 class="page-title">Private Links</h1>
      <p class="lead">輸入密碼後，在瀏覽器本機解密常用連結。</p>
    </section>

    <section id="lockedView" class="private-panel locked-box">
      <form id="unlockForm">
        <div class="form-row">
          <label for="passwordInput">密碼</label>
          <input id="passwordInput" class="input" type="password" autocomplete="current-password" required />
        </div>
        <button class="button-link" type="submit">解鎖</button>
      </form>
      <p id="statusText" class="lead" style="font-size:14px;margin-top:18px" aria-live="polite"></p>
    </section>

    <section id="unlockedView" class="hidden" style="grid-column:1 / -1">
      <div class="links-toolbar">
        <div>
          <p class="kicker">Unlocked</p>
          <h2 style="margin:0;font-size:32px">Quick Links</h2>
          <p id="updatedText" class="meta" style="margin-top:8px"></p>
        </div>
        <div class="actions">
          <input id="searchInput" class="input" type="search" placeholder="搜尋" />
          <button id="lockButton" class="button-link" type="button">鎖定</button>
        </div>
      </div>
      <div id="groupList"></div>
      <p id="emptyText" class="hidden private-panel">沒有符合搜尋的連結。</p>
    </section>
  </main>

  <script>
    (function () {
      const lockedView = document.getElementById("lockedView");
      const unlockedView = document.getElementById("unlockedView");
      const unlockForm = document.getElementById("unlockForm");
      const passwordInput = document.getElementById("passwordInput");
      const statusText = document.getElementById("statusText");
      const groupList = document.getElementById("groupList");
      const searchInput = document.getElementById("searchInput");
      const emptyText = document.getElementById("emptyText");
      const lockButton = document.getElementById("lockButton");
      const updatedText = document.getElementById("updatedText");
      const VAULT_AAD = "xu-yu-chia.github.io/links/v2";

      let vault = null;
      let links = [];

      function setStatus(message, tone) {
        statusText.textContent = message;
        statusText.style.color = tone === "error" ? "#f0a7a1" : "#b8b4aa";
      }

      function fromBase64(value) {
        const binary = atob(value);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }

      async function decryptVault(password) {
        if (!window.crypto || !window.crypto.subtle) throw new Error("Web Crypto is not available.");
        if (vault.algorithm !== "AES-256-GCM" || vault.kdf !== "PBKDF2-SHA256") {
          throw new Error("Unsupported encrypted payload.");
        }

        const encoder = new TextEncoder();
        const vaultVersion = Number(vault.version);
        const iterations = Number(vault.iterations);
        const minimumIterations = vaultVersion === 2 ? 600000 : 100000;
        if (!Number.isInteger(iterations) || iterations < minimumIterations || iterations > 2000000) {
          throw new Error("Unsupported encrypted payload.");
        }
        if (vaultVersion === 2 && (vault.aad !== VAULT_AAD || Number(vault.tag_length) !== 128)) {
          throw new Error("Unsupported encrypted payload.");
        }
        if (vaultVersion !== 1 && vaultVersion !== 2) {
          throw new Error("Unsupported encrypted payload.");
        }
        const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(password.trim()), "PBKDF2", false, ["deriveKey"]);
        const key = await crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: fromBase64(vault.salt), iterations, hash: "SHA-256" },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["decrypt"]
        );
        const decryptParams = {
          name: "AES-GCM",
          iv: fromBase64(vault.iv),
          tagLength: Number(vault.tag_length || 128)
        };
        if (vaultVersion === 2) {
          decryptParams.additionalData = encoder.encode(VAULT_AAD);
        }
        const plain = await crypto.subtle.decrypt(decryptParams, key, fromBase64(vault.ciphertext));
        return JSON.parse(new TextDecoder().decode(plain));
      }

      function normalizePayload(payload) {
        const rawLinks = normalizeRawLinks(payload);
        return rawLinks
          .filter((item) => item && item.title && item.url && isSafeUrl(item.url))
          .map((item) => ({
            title: String(item.title),
            url: String(item.url),
            note: item.note || item.description || "",
            group: item.group || item.category || "Links"
          }));
      }

      function isSafeUrl(value) {
        try {
          const parsed = new URL(String(value));
          return parsed.protocol === "http:" || parsed.protocol === "https:";
        } catch (_error) {
          return false;
        }
      }

      function normalizeRawLinks(payload) {
        if (Array.isArray(payload)) return payload;
        if (!payload || typeof payload !== "object") return [];
        if (Array.isArray(payload.links)) return payload.links;
        if (payload.links && typeof payload.links === "object") return linksFromMap(payload.links);
        return linksFromMap(payload);
      }

      function linksFromMap(map) {
        return Object.entries(map)
          .filter((entry) => !["password", "passphrase", "unlockPassword"].includes(entry[0]))
          .map(([title, value]) => {
            if (typeof value === "string") return { title, url: value };
            if (value && typeof value === "object") return { title, ...value };
            return null;
          })
          .filter(Boolean);
      }

      function render() {
        const keyword = searchInput.value.trim().toLowerCase();
        const filtered = links.filter((item) => [item.title, item.note, item.group, item.url].join(" ").toLowerCase().includes(keyword));
        const groups = filtered.reduce((acc, item) => {
          if (!acc.has(item.group)) acc.set(item.group, []);
          acc.get(item.group).push(item);
          return acc;
        }, new Map());

        groupList.innerHTML = "";
        emptyText.classList.toggle("hidden", filtered.length !== 0);

        groups.forEach((items, group) => {
          const section = document.createElement("section");
          section.className = "section";
          const title = document.createElement("h2");
          title.className = "meta";
          title.textContent = group;
          const grid = document.createElement("div");
          grid.className = "link-grid";

          items.forEach((item) => {
            const card = document.createElement("a");
            card.className = "link-card";
            card.href = item.url;
            card.target = "_blank";
            card.rel = "noopener noreferrer";
            card.innerHTML = "<h3></h3><p></p>";
            card.querySelector("h3").textContent = item.title;
            card.querySelector("p").textContent = item.note || item.url;
            grid.appendChild(card);
          });

          section.append(title, grid);
          groupList.appendChild(section);
        });
      }

      async function loadVault() {
        try {
          const response = await fetch("vault.json", { cache: "no-store" });
          if (!response.ok) throw new Error("missing");
          vault = await response.json();
          setStatus("加密資料已載入，請輸入密碼。");
        } catch (error) {
          setStatus("找不到 vault.json，請確認 GitHub Secret 已建立並且 workflow 已成功執行。", "error");
        }
      }

      unlockForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!vault) return;
        setStatus("解鎖中...");

        try {
          const payload = await decryptVault(passwordInput.value);
          links = normalizePayload(payload);
          if (!links.length) throw new Error("empty");
          lockedView.classList.add("hidden");
          unlockedView.classList.remove("hidden");
          updatedText.textContent = vault.version === 2 ? "已使用本機解密" : "舊版 vault，請重新執行加密 workflow";
          passwordInput.value = "";
          render();
          searchInput.focus();
        } catch (error) {
          setStatus("解鎖失敗：密碼錯誤或連結資料格式不正確。", "error");
        }
      });

      searchInput.addEventListener("input", render);
      lockButton.addEventListener("click", () => {
        links = [];
        groupList.innerHTML = "";
        searchInput.value = "";
        unlockedView.classList.add("hidden");
        lockedView.classList.remove("hidden");
        passwordInput.focus();
      });

      loadVault();
    })();
  </script>
</body>
</html>
