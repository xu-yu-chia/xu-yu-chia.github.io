</head>

  <header class="sticky top-0 z-20 border-b border-white/10 bg-slate-950/90 backdrop-blur">

      <ul class="hidden items-center gap-6 text-sm md:flex">

  <main>
    <section class="mx-auto grid min-h-[calc(100vh-73px)] max-w-6xl items-center gap-10 px-5 py-10 lg:grid-cols-[1.08fr_0.92fr]">
      <div>
        <p class="text-sm font-semibold uppercase tracking-[0.28em] text-cyan-200">Portfolio</p>
        <h1 class="mt-4 text-4xl font-extrabold leading-tight md:text-6xl">
          歡迎來到 <span class="text-cyan-200">Xu Yu-Chia's Blog</span>
        </h1>
        <p class="mt-5 max-w-2xl text-lg leading-8 text-slate-300">
          這裡整理我的專案、運動紀錄、學習筆記與聯絡資訊。
        </p>

        <div class="mt-7 flex flex-wrap gap-3">
          <a href="about/index.html" class="inline-flex items-center gap-2 rounded-lg bg-white/10 px-4 py-2 font-semibold hover:bg-white/15">
            <i class="fa fa-user"></i> About
          </a>
          <a href="projects/index.html" class="inline-flex items-center gap-2 rounded-lg bg-white/10 px-4 py-2 font-semibold hover:bg-white/15">
            <i class="fa fa-folder-open"></i> Projects
          </a>
          <a href="sports/index.html" class="inline-flex items-center gap-2 rounded-lg bg-white/10 px-4 py-2 font-semibold hover:bg-white/15">

            <i class="fa fa-lock"></i> Links
          </a>
        </div>
      </div>

      <div class="space-y-4">
        <section class="rounded-lg border border-white/10 bg-white/[0.04] p-5">
          <p class="text-xs font-semibold uppercase tracking-[0.24em] text-cyan-200">Taipei Time</p>
          <p id="clockDate" class="mt-3 text-sm text-slate-300">--</p>
          <p id="clockWeekday" class="text-sm text-slate-300">--</p>
          <p id="clockTime" class="mt-4 text-4xl font-extrabold tabular-nums text-cyan-200 md:text-5xl">--:--:--</p>
        </section>

        <section class="grid gap-3 sm:grid-cols-2">
          <a href="https://xu-yu-chia.github.io/blog/" class="rounded-lg border border-white/10 bg-white/[0.04] p-4 hover:border-cyan-300/60">
            <i class="fas fa-pen text-amber-200"></i>
            <h2 class="mt-3 font-semibold">Blog</h2>
            <p class="mt-1 text-sm text-slate-400">技術筆記與文章</p>
          </a>
          <a href="contact/index.html" class="rounded-lg border border-white/10 bg-white/[0.04] p-4 hover:border-cyan-300/60">
            <i class="fa fa-envelope text-emerald-200"></i>
            <h2 class="mt-3 font-semibold">Contact</h2>
            <p class="mt-1 text-sm text-slate-400">聯絡方式</p>
          </a>
          <a href="teacher/index.html" class="rounded-lg border border-white/10 bg-white/[0.04] p-4 hover:border-cyan-300/60">

            <h2 class="mt-3 font-semibold">Bike</h2>
            <p class="mt-1 text-sm text-slate-400">車輛資訊</p>
          </a>
        </section>
      </div>
    </section>
  </main>

  <script>
    function updateClock() {
      const now = new Date();
      const formatter = new Intl.DateTimeFormat("zh-TW", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "long",
        day: "numeric"
      });
      const weekdayFormatter = new Intl.DateTimeFormat("zh-TW", {
        timeZone: "Asia/Taipei",
        weekday: "long"
      });
      const timeFormatter = new Intl.DateTimeFormat("zh-TW", {
        timeZone: "Asia/Taipei",
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      document.getElementById("clockDate").textContent = formatter.format(now);
      document.getElementById("clockWeekday").textContent = weekdayFormatter.format(now);
      document.getElementById("clockTime").textContent = timeFormatter.format(now);
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
