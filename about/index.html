<body class="bg-gray-950 text-gray-200">
  <header class="sticky top-0 z-20 border-b border-white/10 bg-slate-950/85 backdrop-blur">
    <nav class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <div class="text-xl font-bold tracking-wide"><a href="../index.html"><i class="fa fa-home"></i></a> Xu Yu-Chia's Blog</div>
      <ul class="hidden md:flex space-x-6 text-sm">
        <li><a href="../about/index.html" class="hover:text-gray-300"><i class="fa fa-address-card"> About Me</i></a></li>
        <li><a href="../projects/index.html" class="hover:text-gray-300"><i class="fa fa-folder-open"> Projects</i></a></li>
        <li><a href="https://xu-yu-chia.github.io/blog/" class="hover:text-gray-300"><i class="fas fa-pen"> Blogs</i></a></li>
        <li><a href="../sports/index.html" class="hover:text-gray-300"><i class="fa fa-running"> Sports Record</i></a></li>
        <li><a href="../contact/index.html" class="hover:text-gray-300"><i class="fa fa-phone"> Contact Me</i></a></li>
        <li>
          <a href="https://docs.google.com/presentation/d/1PIOmGUC-IwMWeeA96dt9h67mbW_WYWk7KJJUqrlnt80/edit?usp=sharing" class="hover:text-gray-300">
            <i class="fa fa-file"></i>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="max-w-5xl mx-auto p-8">
    <section class="bg-gradient-to-br from-sky-600 via-indigo-600 to-violet-700 text-white p-8 rounded-2xl shadow-xl">
      <p id="secretTrigger" class="text-sm uppercase tracking-[0.2em] text-sky-200 select-none">Profile</p>
      <h1 class="text-4xl font-extrabold mt-2 mb-6">About Me</h1>

      <div class="grid md:grid-cols-2 gap-4">
        <div class="bg-white/10 border border-white/20 rounded-xl p-5 backdrop-blur-sm">
          <p class="text-lg leading-relaxed">嗨，我是 <span class="text-yellow-300 font-bold">許彧嘉</span>。</p>
          <p class="text-base text-sky-100 mt-3 leading-relaxed">
            目前就讀中央大學電機工程學系，熱愛程式設計與長跑訓練。
          </p>
        </div>
        <div class="bg-white/10 border border-white/20 rounded-xl p-5 backdrop-blur-sm">
          <p class="text-base leading-relaxed">
            我喜歡把技術與紀律結合，透過專案開發、競賽與運動，持續訓練問題解決能力與執行力。
          </p>
          <div class="flex flex-wrap gap-2 mt-4">
            <span class="px-3 py-1 rounded-full bg-cyan-300/20 text-cyan-100 text-sm">C/C++</span>
            <span class="px-3 py-1 rounded-full bg-blue-300/20 text-blue-100 text-sm">Web</span>
            <span class="px-3 py-1 rounded-full bg-purple-300/20 text-purple-100 text-sm">Running</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const trigger = document.getElementById("secretTrigger");
      if (!trigger) return;

      const SECRET_URL = "https://drive.google.com/drive/folders/1IZHCREJtgujggHoZeD4I4c2O-Zm24wlU?usp=sharing";
      let clickCount = 0;
      let firstClickAt = 0;

      function validCodes() {
        const now = new Date();
        const pad2 = (n) => String(n).padStart(2, "0");
        return [-1, 0, 1].map((offset) => {
          const t = new Date(now.getTime() + offset * 60000);
          return `${pad2(t.getHours())}${pad2(t.getMinutes())}`;
        });
      }

      trigger.addEventListener("click", function () {
        const now = Date.now();
        if (!firstClickAt || now - firstClickAt > 8000) {
          firstClickAt = now;
          clickCount = 0;
        }

        clickCount += 1;
        if (clickCount < 5) return;

        clickCount = 0;
        firstClickAt = 0;

        const input = prompt("請輸入 4 碼驗證碼");
        if (!input) return;
        if (validCodes().includes(input.trim())) {
          window.location.href = SECRET_URL;
        }
      });
    })();
  </script>
</body>
</html>
